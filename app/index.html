<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<meta name="robots" content="noindex">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Leverage Score</title>
<style>
  :root {
    --page: #0d0d0d; --card: #1a1a19; --card2: #222220;
    --ink: #fff; --ink2: #c3c2b7; --ink3: #898781;
    --ring: rgba(255,255,255,0.10);
    --pA: #3987e5; --pB: #199e70;
    --h0: #8a7440; --h1: #c98500; --h2: #eda100; --h3: #ffc233;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom));
  }
  .wrap { max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  header { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 2px 0; }
  .wordmark { font-size: 14px; font-weight: 800; letter-spacing: 0.2em; }
  .wordmark span { color: var(--h3); }
  .lang { background: none; border: 1px solid var(--ring); color: var(--ink2); border-radius: 6px;
          padding: 4px 10px; font-size: 12px; font-family: inherit; }
  .card { background: var(--card); border: 1px solid var(--ring); border-radius: 12px; padding: 14px; }
  .lab { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }

  /* setup */
  .setup .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .setup input[type="text"] {
    flex: 1; min-width: 0; background: var(--card2); border: 1px solid var(--ring); border-radius: 8px;
    color: var(--ink); padding: 8px 10px; font-size: 15px; font-weight: 700; font-family: inherit;
  }
  .setup .chip { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .seg { display: flex; border: 1px solid var(--ring); border-radius: 8px; overflow: hidden; }
  .seg button { background: var(--card2); color: var(--ink2); border: none; padding: 8px 12px;
                font-size: 13px; font-weight: 700; font-family: inherit; }
  .seg button.on { background: var(--h1); color: #0d0d0d; }
  details summary { cursor: pointer; font-size: 12px; color: var(--ink3); list-style: none; }
  details summary::before { content: "\25B8 "; }
  details[open] summary::before { content: "\25BE "; }

  /* setup steppers (settings only) */
  .step { display: inline-flex; align-items: center; gap: 2px; }
  .small .v { min-width: 44px; text-align: center; font-size: 15px; font-weight: 800;
              font-variant-numeric: tabular-nums; }
  .small button { width: 28px; height: 30px; font-size: 15px; border-radius: 6px;
                  border: 1px solid var(--ring); background: var(--card2);
                  color: var(--ink2); font-weight: 700; font-family: inherit; }

  /* scoreboard */
  .sb { display: grid; gap: 8px; }
  .sbrow { display: grid; grid-template-columns: 1fr 34px 46px 46px 56px; gap: 7px; align-items: center; }
  .sbhead { display: grid; grid-template-columns: 1fr 34px 46px 46px 56px; gap: 7px;
            font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--ink3); font-weight: 700; text-align: center; }
  .sbhead span:first-child { text-align: left; }
  .sbnm { font-weight: 800; font-size: 15px; overflow: hidden; text-overflow: ellipsis;
          white-space: nowrap; display: flex; align-items: center; gap: 7px; }
  .sbnm::before { content: ""; width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .sbnm.a::before { background: var(--pA); } .sbnm.b::before { background: var(--pB); }
  .cell { height: 46px; border-radius: 9px; background: var(--card2); border: 1px solid var(--ring);
          color: var(--ink); font-size: 20px; font-weight: 800; font-family: inherit;
          font-variant-numeric: tabular-nums; touch-action: manipulation; user-select: none;
          -webkit-user-select: none; padding: 0; }
  .cell:active { background: #2c2c2a; }
  .cell.pts { color: var(--h3); }
  .srv { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--ring);
         background: var(--card2); font-size: 14px; margin: 0 auto; display: block;
         touch-action: manipulation; }
  .srv.on { background: var(--h3); border-color: var(--h3); }

  /* result */
  .hero { text-align: center; padding: 18px 14px; }
  .hero .mult { font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -0.01em; }
  .hero .sub { font-size: 12.5px; color: var(--ink2); margin-top: 6px; }
  .bar { display: flex; height: 16px; border-radius: 5px; overflow: hidden; gap: 2px;
         background: var(--page); margin-top: 14px; }
  .bar .a { background: var(--pA); } .bar .b { background: var(--pB); }
  .nums { display: flex; justify-content: space-between; font-size: 14px; font-weight: 800;
          margin-top: 5px; font-variant-numeric: tabular-nums; }
  .nums .na { color: var(--pA); } .nums .nb { color: var(--pB); }
  .branches { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .br { background: var(--card2); border-radius: 8px; padding: 9px 10px; text-align: left; }
  .br .t { font-size: 11px; color: var(--ink3); margin-bottom: 3px; }
  .br .v { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .br .d { font-size: 11px; color: var(--ink2); }

  /* point buttons */
  .ptbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ptbtns button {
    padding: 16px 8px; border: none; border-radius: 12px; font-size: 15px; font-weight: 800;
    font-family: inherit; color: #fff; letter-spacing: 0.02em;
  }
  .ptbtns .pa { background: var(--pA); } .ptbtns .pb { background: var(--pB); }
  .ptbtns button:active { filter: brightness(1.2); }
  .uc { display: flex; gap: 10px; margin-top: 10px; }
  .uc button { flex: 1; background: var(--card2); border: 1px solid var(--ring); color: var(--ink2);
               border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 700; font-family: inherit; }
  .champ { text-align: center; font-size: 20px; font-weight: 800; color: var(--h3); padding: 8px 0 2px; }
  footer { font-size: 10.5px; color: var(--ink3); text-align: center; line-height: 1.5; padding: 4px 10px; }
  footer a { color: var(--ink2); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="wordmark"><span>LEVER</span>AGE&nbsp;SCORE</div>
    <button class="lang" id="langBtn">IT</button>
  </header>

  <details class="card setup" id="setup">
    <summary id="setupSummary"></summary>
    <div style="height:10px"></div>
    <div class="row"><span class="chip" style="background:var(--pA)"></span>
      <input type="text" id="nameA" maxlength="14"></div>
    <div class="row"><span class="chip" style="background:var(--pB)"></span>
      <input type="text" id="nameB" maxlength="14"></div>
    <div class="row">
      <span style="font-size:12px;color:var(--ink3)" id="srvLabA"></span>
      <span class="step small" style="--w:1">
        <button data-k="pA" data-d="-0.005">&minus;</button><span class="v" id="vPA"></span><button data-k="pA" data-d="0.005">+</button>
      </span>
    </div>
    <div class="row">
      <span style="font-size:12px;color:var(--ink3)" id="srvLabB"></span>
      <span class="step small">
        <button data-k="pB" data-d="-0.005">&minus;</button><span class="v" id="vPB"></span><button data-k="pB" data-d="0.005">+</button>
      </span>
    </div>
    <div class="row">
      <span style="font-size:12px;color:var(--ink3)" id="boLab"></span>
      <span class="seg">
        <button id="bo3">3</button><button id="bo5">5</button>
      </span>
    </div>
  </details>

  <div class="card">
    <div class="lab" id="scLab"></div>
    <div class="sb">
      <div class="sbhead"><span></span><span id="thSrv"></span><span id="thSets"></span><span id="thGames"></span><span id="thPts"></span></div>
      <div class="sbrow">
        <span class="sbnm a" id="scNameA"></span>
        <button class="srv" id="srvA">&#127934;</button>
        <button class="cell" data-c="sets" data-p="A" id="vSetsA"></button>
        <button class="cell" data-c="games" data-p="A" id="vGamesA"></button>
        <button class="cell pts" data-c="pts" data-p="A" id="vPtsA"></button>
      </div>
      <div class="sbrow">
        <span class="sbnm b" id="scNameB"></span>
        <button class="srv" id="srvB">&#127934;</button>
        <button class="cell" data-c="sets" data-p="B" id="vSetsB"></button>
        <button class="cell" data-c="games" data-p="B" id="vGamesB"></button>
        <button class="cell pts" data-c="pts" data-p="B" id="vPtsB"></button>
      </div>
    </div>
  </div>

  <div class="card hero">
    <div class="lab" id="heroLab"></div>
    <div class="champ" id="champ" style="display:none"></div>
    <div class="mult" id="mult">1.0&times;</div>
    <div class="sub" id="multSub"></div>
    <div class="bar"><div class="a" id="barA" style="width:50%"></div><div class="b" id="barB" style="width:50%"></div></div>
    <div class="nums"><span class="na" id="numA">50.0</span><span class="nb" id="numB">50.0</span></div>
    <div class="branches">
      <div class="br"><div class="t" id="brALab"></div><div class="v" id="brA"></div><div class="d" id="brAd"></div></div>
      <div class="br"><div class="t" id="brBLab"></div><div class="v" id="brB"></div><div class="d" id="brBd"></div></div>
    </div>
  </div>

  <div>
    <div class="ptbtns">
      <button class="pa" id="ptA"></button>
      <button class="pb" id="ptB"></button>
    </div>
    <div class="uc">
      <button id="undo"></button>
      <button id="reset"></button>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<script type="module">
import * as E from "./engine.js";

const I18N = {
  en: {
    setup: "Players & settings", srvA: "Serve strength", srvB: "Serve strength",
    bo: "Best of", score: "Current score — tap a number, hold to go back", srv: "Serve",
    sets: "Sets", games: "Games", pts: "Points",
    hero: "This point is worth", multSub: "of an average point between these two",
    ifWins: "if {n} wins it", pt: "Point", undo: "Undo", reset: "New match",
    champion: "{n} wins the match",
    foot: "Leverage = win-probability swing of the next point, computed exactly from the score (Morris 1977). Part of the <a href='../'>Leverage Scoreboard</a> project.",
    playerA: "Player A", playerB: "Player B",
  },
  it: {
    setup: "Giocatori e impostazioni", srvA: "Forza al servizio", srvB: "Forza al servizio",
    bo: "Al meglio di", score: "Punteggio attuale — tocca un numero, tieni premuto per tornare indietro", srv: "Servizio",
    sets: "Set", games: "Game", pts: "Punti",
    hero: "Questo punto vale", multSub: "di un punto medio tra questi due",
    ifWins: "se lo vince {n}", pt: "Punto", undo: "Annulla", reset: "Nuova partita",
    champion: "{n} vince la partita",
    foot: "Leva = oscillazione della probabilità di vittoria sul prossimo punto, calcolata esattamente dal punteggio (Morris 1977). Parte del progetto <a href='../it/'>Leverage Scoreboard</a>.",
    playerA: "Giocatore A", playerB: "Giocatore B",
  },
};

const HEAT = m => m >= 6 ? "#ffc233" : m >= 3 ? "#eda100" : m >= 1.2 ? "#c98500" : "#8a7440";
const $ = id => document.getElementById(id);

let cfg = JSON.parse(localStorage.getItem("levscore") || "null") || {
  lang: "en", nameA: "", nameB: "", pA: 0.64, pB: 0.64, bestOf: 3,
  st: null, hist: [],
};
if (!cfg.st) cfg.st = E.newState(cfg.pA, cfg.pB, cfg.bestOf);

function T(k) { return I18N[cfg.lang][k]; }
function save() { localStorage.setItem("levscore", JSON.stringify(cfg)); }
function nm(k) {
  return (k === "A" ? cfg.nameA : cfg.nameB) || T(k === "A" ? "playerA" : "playerB");
}

const PTCALL = ["0", "15", "30", "40", "Ad"];

function ptDisplay(v, s) { return E.inTiebreak(s) ? String(v) : PTCALL[v]; }

/* ---- validation for direct score entry ---- */
function clampState(s) {
  const need = E.setsToWin(s);
  s.setsA = Math.max(0, Math.min(need - 1, s.setsA));
  s.setsB = Math.max(0, Math.min(need - 1, s.setsB));
  s.gamesA = Math.max(0, Math.min(6, s.gamesA));
  s.gamesB = Math.max(0, Math.min(6, s.gamesB));
  // a live set can't already be won: 6-x with margin>=2 is finished -> pull back
  while ((s.gamesA >= 6 || s.gamesB >= 6) && Math.abs(s.gamesA - s.gamesB) >= 2) {
    if (s.gamesA > s.gamesB) s.gamesA--; else s.gamesB--;
  }
  if (E.inTiebreak(s)) {
    s.ptsA = Math.max(0, Math.min(50, s.ptsA));
    s.ptsB = Math.max(0, Math.min(50, s.ptsB));
  } else {
    s.ptsA = Math.max(0, Math.min(4, s.ptsA));
    s.ptsB = Math.max(0, Math.min(4, s.ptsB));
    if (s.ptsA === 4 && s.ptsB !== 3) s.ptsA = s.ptsB === 4 ? 3 : 3;
    if (s.ptsB === 4 && s.ptsA !== 3) s.ptsB = 3;
    // a live game can't already be won
    while ((s.ptsA >= 4 || s.ptsB >= 4) && Math.abs(s.ptsA - s.ptsB) >= 2) {
      if (s.ptsA > s.ptsB) s.ptsA--; else s.ptsB--;
    }
  }
  return s;
}

/* ---- render ---- */
function render() {
  document.documentElement.lang = cfg.lang;
  $("langBtn").textContent = cfg.lang === "en" ? "IT" : "EN";
  $("setupSummary").textContent = T("setup");
  $("srvLabA").textContent = `${nm("A")} — ${T("srvA")}`;
  $("srvLabB").textContent = `${nm("B")} — ${T("srvB")}`;
  $("boLab").textContent = T("bo");
  $("scLab").textContent = T("score");
  $("thSrv").textContent = T("srv"); $("thSets").textContent = T("sets");
  $("thGames").textContent = T("games"); $("thPts").textContent = T("pts");
  $("heroLab").textContent = T("hero");
  $("undo").textContent = T("undo"); $("reset").textContent = T("reset");
  $("foot").innerHTML = T("foot");
  $("nameA").placeholder = T("playerA"); $("nameB").placeholder = T("playerB");
  if (document.activeElement !== $("nameA")) $("nameA").value = cfg.nameA;
  if (document.activeElement !== $("nameB")) $("nameB").value = cfg.nameB;
  $("vPA").textContent = (cfg.pA * 100).toFixed(1) + "%";
  $("vPB").textContent = (cfg.pB * 100).toFixed(1) + "%";
  $("bo3").className = cfg.bestOf === 3 ? "on" : "";
  $("bo5").className = cfg.bestOf === 5 ? "on" : "";

  const s = cfg.st;
  $("scNameA").textContent = nm("A"); $("scNameB").textContent = nm("B");
  $("ptA").textContent = `${T("pt")} ${nm("A")}`;
  $("ptB").textContent = `${T("pt")} ${nm("B")}`;
  $("srvA").className = "srv" + (s.server === "A" ? " on" : "");
  $("srvB").className = "srv" + (s.server === "B" ? " on" : "");
  $("vSetsA").textContent = s.setsA; $("vSetsB").textContent = s.setsB;
  $("vGamesA").textContent = s.gamesA; $("vGamesB").textContent = s.gamesB;
  $("vPtsA").textContent = ptDisplay(s.ptsA, s);
  $("vPtsB").textContent = ptDisplay(s.ptsB, s);

  const over = E.winner(s);
  if (over) {
    $("champ").style.display = "";
    $("champ").textContent = T("champion").replace("{n}", nm(over));
    $("mult").textContent = "–";
    $("mult").style.color = "var(--ink3)";
    $("multSub").textContent = "";
    const w = over === "A" ? 1 : 0;
    $("barA").style.width = (w * 100) + "%"; $("barB").style.width = ((1 - w) * 100) + "%";
    $("numA").textContent = (w * 100).toFixed(0); $("numB").textContent = ((1 - w) * 100).toFixed(0);
    $("brA").textContent = "–"; $("brB").textContent = "–";
    $("brALab").textContent = ""; $("brBLab").textContent = "";
    $("brAd").textContent = ""; $("brBd").textContent = "";
    $("ptA").disabled = $("ptB").disabled = true;
    save();
    return;
  }
  $("champ").style.display = "none";
  $("ptA").disabled = $("ptB").disabled = false;

  const wp = E.winProb(s);
  const lev = E.leverage(s);
  const mean = E.meanLeverage(s.pA, s.pB, s.bestOf);
  const mult = lev / mean;
  $("mult").textContent = mult.toFixed(1) + "×";
  $("mult").style.color = HEAT(mult);
  $("multSub").textContent = T("multSub");
  $("barA").style.width = (wp * 100) + "%";
  $("barB").style.width = (100 - wp * 100) + "%";
  $("numA").textContent = (wp * 100).toFixed(1);
  $("numB").textContent = (100 - wp * 100).toFixed(1);

  const wA = E.winProb(E.pointWon(s, "A"));
  const wB = E.winProb(E.pointWon(s, "B"));
  $("brALab").textContent = T("ifWins").replace("{n}", nm("A"));
  $("brBLab").textContent = T("ifWins").replace("{n}", nm("B"));
  $("brA").textContent = (wA * 100).toFixed(1) + "%";
  $("brB").textContent = ((1 - wB) * 100).toFixed(1) + "%";
  $("brAd").textContent = `${nm("A")} +${((wA - wp) * 100).toFixed(1)}`;
  $("brBd").textContent = `${nm("B")} +${((wp - wB) * 100).toFixed(1)}`;
  save();
}

/* ---- events ---- */
$("langBtn").onclick = () => { cfg.lang = cfg.lang === "en" ? "it" : "en"; render(); };
$("nameA").oninput = e => { cfg.nameA = e.target.value; render(); };
$("nameB").oninput = e => { cfg.nameB = e.target.value; render(); };
$("bo3").onclick = () => { cfg.bestOf = 3; cfg.st.bestOf = 3; clampState(cfg.st); render(); };
$("bo5").onclick = () => { cfg.bestOf = 5; cfg.st.bestOf = 5; clampState(cfg.st); render(); };
document.querySelectorAll("[data-k]").forEach(b => b.onclick = () => {
  const k = b.dataset.k, d = parseFloat(b.dataset.d);
  cfg[k] = Math.round(Math.min(0.80, Math.max(0.50, cfg[k] + d)) * 1000) / 1000;
  cfg.st[k] = cfg[k];
  render();
});
/* tap = next valid value, hold = previous. Cycles wrap. */
function validList(field, p, s) {
  const other = field === "sets" ? (p === "A" ? s.setsB : s.setsA)
              : field === "games" ? (p === "A" ? s.gamesB : s.gamesA)
              : (p === "A" ? s.ptsB : s.ptsA);
  if (field === "sets") {
    const need = E.setsToWin(s);
    return Array.from({length: need}, (_, i) => i);
  }
  if (field === "games") {
    const out = [];
    for (let x = 0; x <= 6; x++)
      if (!((x >= 6 || other >= 6) && Math.abs(x - other) >= 2)) out.push(x);
    return out;
  }
  if (E.inTiebreak(s)) return Array.from({length: 25}, (_, i) => i);
  if (other === 4) return [3];                      // opponent has Ad
  const out = [0, 1, 2, 3];
  if (other === 3) out.push(4);                     // Ad only vs 40
  return out;
}

function cycle(field, p, dir) {
  const s = cfg.st;
  const key = field + p;
  const wasTb = E.inTiebreak(s);
  const list = validList(field, p, s);
  let i = list.indexOf(s[key]);
  if (i < 0) i = 0;
  s[key] = list[(i + dir + list.length) % list.length];
  if (E.inTiebreak(s) !== wasTb) { s.ptsA = 0; s.ptsB = 0; }
  clampState(s);
  cfg.hist = [];
  render();
}

document.querySelectorAll(".cell").forEach(b => {
  const field = b.dataset.c, p = b.dataset.p;
  let timer = null, held = false;
  b.addEventListener("pointerdown", () => {
    held = false;
    timer = setTimeout(() => { held = true; cycle(field, p, -1); }, 450);
  });
  b.addEventListener("pointerup", () => {
    clearTimeout(timer);
    if (!held) cycle(field, p, 1);
  });
  b.addEventListener("pointerleave", () => clearTimeout(timer));
  b.addEventListener("contextmenu", e => e.preventDefault());
});
$("srvA").onclick = () => { cfg.st.server = "A"; render(); };
$("srvB").onclick = () => { cfg.st.server = "B"; render(); };
$("ptA").onclick = () => { cfg.hist.push(JSON.stringify(cfg.st)); cfg.st = E.pointWon(cfg.st, "A"); render(); };
$("ptB").onclick = () => { cfg.hist.push(JSON.stringify(cfg.st)); cfg.st = E.pointWon(cfg.st, "B"); render(); };
$("undo").onclick = () => { if (cfg.hist.length) { cfg.st = JSON.parse(cfg.hist.pop()); render(); } };
$("reset").onclick = () => { cfg.st = E.newState(cfg.pA, cfg.pB, cfg.bestOf); cfg.hist = []; render(); };

render();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
